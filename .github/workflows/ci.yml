name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
      - run: go mod download
      - run: go build -v ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  generate:
    name: Generate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: go generate ./...
      - run: cd tools && go generate ./...
      - name: Verify no generated changes
        run: |
          git diff --compact-summary --exit-code || \
            (echo "::error::Uncommitted changes after running go generate. Run 'make generate' and commit the results." && exit 1)

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
      - run: go test -v -coverprofile=coverage.txt -timeout=120s -parallel=10 ./...
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # Acceptance tests require JumpCloud API credentials and are run manually
  # or on a schedule. They are not run on every PR.
  # To run locally: JUMPCLOUD_API_KEY=xxx make testacc
