name: Feature Request
description: Request a new resource, data source, or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement!

  - type: dropdown
    id: type
    attributes:
      label: Request Type
      options:
        - New Resource
        - New Data Source
        - Enhancement to Existing Resource/Data Source
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the feature you'd like.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the use case or problem this would solve.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Proposed Configuration
      description: If applicable, show what the Terraform configuration would look like.
      render: hcl
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to relevant JumpCloud API docs, related issues, etc.
    validations:
      required: false
