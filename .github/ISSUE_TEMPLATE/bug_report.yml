name: Bug Report
description: Report a bug in the JumpCloud Terraform Provider
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the information below.

  - type: input
    id: terraform-version
    attributes:
      label: Terraform Version
      description: Output of `terraform version`
      placeholder: "1.9.0"
    validations:
      required: true

  - type: input
    id: provider-version
    attributes:
      label: Provider Version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: affected-resources
    attributes:
      label: Affected Resource(s) / Data Source(s)
      description: Which resources or data sources are affected?
      placeholder: |
        - jumpcloud_user
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Terraform Configuration
      description: Relevant Terraform configuration (redact any sensitive values)
      render: hcl
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or debug output.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or log output.
    validations:
      required: false
